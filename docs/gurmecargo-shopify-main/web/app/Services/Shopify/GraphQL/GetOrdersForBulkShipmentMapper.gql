query GetOrdersForBulkShipment($ids: [ID!]!) {
    nodes(ids: $ids) {
        ... on Order {
            id
            name
            currentTotalPriceSet {
                presentmentMoney {
                    amount
                }
            }
            currencyCode
            note
            metafields(first: 100) {
                nodes {
                    key
                    value
                }
            }
            customAttributes {
                key
                value
            }
            paymentGatewayNames
            customer {
                email
                displayName
            }
            displayFinancialStatus
            billingAddress {
                address1
                address2
                city
                firstName
                lastName
                phone
                province
                zip
            }
            shippingLine {
                originalPriceSet {
                    presentmentMoney {
                        amount
                        currencyCode
                    }
                }
            }
            shippingAddress {
                address1
                address2
                city
                country
                countryCodeV2
                firstName
                lastName
                phone
                province
                provinceCode
                zip
            }
            fulfillmentOrders(first: 10) {
                nodes {
                    assignedLocation {
                        location {
                            id
                            name
                        }
                    }
                    supportedActions {
                        action
                    }
                    id
                    lineItems(first: 50) {
                        nodes {
                            id
                            productTitle
                            variantTitle
                            sku
                            remainingQuantity
                            requiresShipping
                            lineItem {
                                discountedTotalSet {
                                    presentmentMoney {
                                        amount
                                    }
                                }
                                originalUnitPriceSet {
                                    presentmentMoney {
                                        amount
                                    }
                                }
                                product {
                                metafields(first: 100) {
                                    nodes {
                                        key
                                        value
                                    }
                                }
                                }
                            }
                            image {
                                src
                            }
                            weight {
                                value
                                unit
                            }
                        }
                    }
                }
            }
        }
    }
}
